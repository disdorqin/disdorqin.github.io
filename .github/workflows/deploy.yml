name: Deploy to GitHub Pages

on:
  # 推送到 main 时自动部署（Pages CMS 保存文章也会触发）
  push:
    branches: [main]
  # 允许手动触发
  workflow_dispatch:

# 允许 GITHUB_TOKEN 写入 Pages 部署
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新触发会取消进行中的旧任务
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
